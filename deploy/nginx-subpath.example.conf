# Exemplo: app em https://dominio.com/attivos/ (build com VITE_BASE_PATH=/attivos)
# Ajuste alias para o caminho real da pasta dist na VPS.

server {
    listen 80;
    server_name dominio.com.br;

    location /attivos/ {
        alias /var/www/attivos/dist/;
        try_files $uri $uri/ /attivos/index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
