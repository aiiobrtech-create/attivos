# Exemplo para Nginx na VPS (site na raiz do domínio).
# Copie para /etc/nginx/sites-available/attivos e ajuste server_name e root.
# root deve apontar para a pasta dist após `npm run build` (ex.: /var/www/attivos/dist).

server {
    listen 80;
    listen [::]:80;
    server_name seu-dominio.com.br www.seu-dominio.com.br;

    root /var/www/attivos/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# Depois: sudo certbot --nginx -d seu-dominio.com.br
# (habilita HTTPS e costuma adicionar redirecionamento 80→443)
